    <style>
      html {
        scroll-padding-top: 100px;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #f4f2ef;
      }
      ::-webkit-scrollbar-thumb {
        background: #c19b76;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d9b99a;
      }

      .font-serif {
        letter-spacing: 0.05em;
      }

      body {
        background-color: #ffffff;
        color: #1a1a1a;
        letter-spacing: 0.01em;
      }

      /* Light form inputs for non-dark sections */
      .input-light {
        background: #ffffff;
        border: 1px solid #e2ddd8;
        color: #1a1a1a;
        transition: border-color 0.2s;
      }
      .input-light:focus { outline: none; border-color: #c19b76; }
      .input-light::placeholder { color: #9ca3af; }

      /* Kivu Noir style menu leader */
      .menu-leader-light {
        flex-grow: 1;
        border-bottom: 1px dotted #c8bfb6;
        margin: 0 10px;
        position: relative;
        top: -4px;
      }

      /* Minimal separator — thin centered line */
      .separator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 1.5rem;
      }
      .separator::before,
      .separator::after {
        content: "";
        display: block;
        width: 48px;
        height: 1px;
        background-color: rgba(193, 155, 118, 0.5);
      }
      .separator-icon {
        width: 4px;
        height: 4px;
        background-color: #c19b76;
        border-radius: 50%;
      }

      /* Text reveal effect */
      .reveal-text {
        position: relative;
        overflow: hidden;
      }
      
      /* Menu Leader Dots */
      .menu-leader {
        flex-grow: 1;
        border-bottom: 1px dotted rgba(193, 155, 118, 0.3);
        margin: 0 12px;
        position: relative;
        top: -5px;
      }

      /* Toast Notifications */
      .toast-container {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 99999;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
        align-items: center;
        pointer-events: none;
      }
      .toast {
        pointer-events: all;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 22px;
        font-size: 14px;
        font-weight: 500;
        min-width: 300px;
        max-width: 500px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        animation: toastIn 0.35s cubic-bezier(0.21,1.02,0.73,1) forwards;
      }
      .toast-success { background: #0a1f0a; border-left: 4px solid #4ade80; color: #86efac; }
      .toast-error   { background: #1f0a0a; border-left: 4px solid #f87171; color: #fca5a5; }
      .toast-info    { background: #1a1409; border-left: 4px solid #c19b76; color: #d9b99a; }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(14px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Category Filter Tabs */
      .cat-tab {
        padding: 6px 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        border: none;
        border-bottom: 1px solid transparent;
        color: #6b7280;
        background: transparent;
        cursor: pointer;
        transition: all 0.2s;
      }
      .cat-tab:hover  { color: #c19b76; }
      .cat-tab.active { color: #c19b76; border-bottom-color: #c19b76; }

      /* API Status Badge */
      .api-badge {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
        padding: 3px 10px; border-radius: 20px; text-transform: uppercase;
      }
      .api-online  { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
      .api-offline { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
      .api-dot { width: 6px; height: 6px; border-radius: 50%; }
      .api-dot-online  { background: #4ade80; animation: blink 2s infinite; }
      .api-dot-offline { background: #f87171; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

      /* Scroll Reveal */
      .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
      .reveal.visible { opacity: 1; transform: translateY(0); }
      .reveal-left { opacity: 0; transform: translateX(-32px); transition: opacity 0.7s ease, transform 0.7s ease; }
      .reveal-left.visible { opacity: 1; transform: translateX(0); }
      .reveal-right { opacity: 0; transform: translateX(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
      .reveal-right.visible { opacity: 1; transform: translateX(0); }

      /* Menu Cards */
      .menu-card {
        background: #16191d;
        border: 1px solid rgba(255,255,255,0.05);
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        position: relative;
      }
      .menu-card:hover {
        border-color: rgba(209,160,84,0.4);
        transform: translateY(-6px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(209,160,84,0.1);
      }
      .menu-card-img {
        width: 100%; height: 200px; object-fit: cover;
        transition: transform 0.6s ease;
      }
      .menu-card:hover .menu-card-img { transform: scale(1.08); }
      .menu-card-overlay {
        position: absolute; top: 0; left: 0; right: 0; height: 200px;
        background: linear-gradient(to top, rgba(14,16,19,0.95) 0%, transparent 60%);
        display: flex; align-items: flex-end; padding: 16px;
        opacity: 0; transition: opacity 0.3s ease;
      }
      .menu-card:hover .menu-card-overlay { opacity: 1; }
      .menu-card-badge {
        position: absolute; top: 12px; left: 12px;
        background: rgba(14,16,19,0.85); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
        color: #d1a054; font-size: 9px; font-weight: 700;
        letter-spacing: 0.15em; text-transform: uppercase;
        padding: 4px 10px; border: 1px solid rgba(209,160,84,0.3);
      }

      /* Stat Cards */
      .stat-card {
        text-align: center; padding: 2.5rem 1.5rem;
        border: 1px solid rgba(255,255,255,0.05);
        background: linear-gradient(135deg, #16191d 0%, #1f2329 100%);
        position: relative; overflow: hidden;
        transition: border-color 0.3s ease, transform 0.3s ease;
      }
      .stat-card::before {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(circle at 50% 0%, rgba(209,160,84,0.08) 0%, transparent 70%);
      }
      .stat-card:hover { border-color: rgba(209,160,84,0.3); transform: translateY(-4px); }

      /* Glassmorphism for modals */
      .glass-card {
        background: rgba(22,25,29,0.92);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(209,160,84,0.15);
        box-shadow: 0 25px 80px rgba(0,0,0,0.6);
      }

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #e4c590 0%, #d1a054 50%, #b38236 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Section divider */
      .section-divider {
        width: 100%; height: 1px;
        background: linear-gradient(to right, transparent, rgba(209,160,84,0.4), transparent);
      }

      /* Floating label inputs */
      .input-line {
        position: relative;
      }
      .input-line::after {
        content: ''; position: absolute; bottom: 0; left: 0;
        width: 0; height: 1px; background: #d1a054;
        transition: width 0.3s ease;
      }
      .input-line:focus-within::after { width: 100%; }

      /* Shimmer button */
      .btn-gold {
        position: relative; overflow: hidden;
        background: #d1a054; color: #0e1013;
        font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
        transition: all 0.3s ease;
      }
      .btn-gold::after {
        content: ''; position: absolute;
        top: 0; left: -100%; width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        transform: skewX(-20deg);
        transition: left 0.5s ease;
      }
      .btn-gold:hover { background: #e4c590; box-shadow: 0 8px 25px rgba(209,160,84,0.35); }
      .btn-gold:hover::after { left: 150%; }

      /* Testimonial card */
      .testimonial-card {
        background: #16191d; border: 1px solid rgba(255,255,255,0.05);
        padding: 2rem; position: relative;
        transition: border-color 0.3s ease, transform 0.3s ease;
      }
      .testimonial-card:hover { border-color: rgba(209,160,84,0.3); transform: translateY(-4px); }
      .testimonial-card::before {
        content: '"'; font-family: 'Forum', serif;
        font-size: 5rem; line-height: 1; color: rgba(209,160,84,0.15);
        position: absolute; top: 0.5rem; left: 1.5rem;
      }

      /* Line clamp */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Cart slide animation */
      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }

      /* Page load fade */
      @keyframes pageFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      body { animation: pageFadeIn 0.6s ease forwards; }
    </style>

      // localStorage-based Backend — no server needed
      const Backend = {
        async createReservation(data) {
          const reservations = JSON.parse(localStorage.getItem('ca_reservations') || '[]');
          reservations.push({ ...data, _id: Date.now().toString(), status: 'pending', createdAt: new Date().toISOString() });
          localStorage.setItem('ca_reservations', JSON.stringify(reservations));
          return { success: true, message: "Reservation confirmed!" };
        },
        async placeOrder(order) {
          const orders = JSON.parse(localStorage.getItem('ca_orders') || '[]');
          orders.push({ ...order, _id: Date.now().toString(), status: 'pending', createdAt: new Date().toISOString() });
          localStorage.setItem('ca_orders', JSON.stringify(orders));
          return { success: true, message: "Order received!" };
        },
        async getReservations() { return JSON.parse(localStorage.getItem('ca_reservations') || '[]'); },
        async getOrders() { return JSON.parse(localStorage.getItem('ca_orders') || '[]'); },
        async updateReservationStatus(id, status) {
          const items = JSON.parse(localStorage.getItem('ca_reservations') || '[]');
          const idx = items.findIndex(i => i._id === id);
          if (idx !== -1) { items[idx].status = status; localStorage.setItem('ca_reservations', JSON.stringify(items)); }
          return items[idx];
        },
        async updateOrderStatus(id, status) {
          const items = JSON.parse(localStorage.getItem('ca_orders') || '[]');
          const idx = items.findIndex(i => i._id === id);
          if (idx !== -1) { items[idx].status = status; localStorage.setItem('ca_orders', JSON.stringify(items)); }
          return items[idx];
        },
      };

        const showToast = (message, type = 'success') => {
          const id = Date.now();
          setToasts(prev => [...prev, { id, message, type }]);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4500);

        // No backend needed - using localStorage

        // No Stripe — payments handled locally

        // Scroll reveal
        React.useEffect(() => {
          const observer = new IntersectionObserver(

            { threshold: 0.12 }
          );
          document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => observer.observe(el));
          return () => observer.disconnect();
        }, [activeCategory]);

        React.useEffect(() => {
          const handleScroll = () => {
            setScrolled(window.scrollY > 50);
            setShowBackToTop(window.scrollY > 300);
          };

          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        React.useEffect(() => {
          const timer = setInterval(() => {
            setCurrentSlide((prev) => (prev + 1) % HERO_SLIDES.length);
          }, 5000);
          return () => clearInterval(timer);

        const addToCart = (item) => {
          setCart(prev => {
            const existing = prev.find(i => i.id === item.id);
            if (existing) {
              return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
            }
            return [...prev, { ...item, quantity: 1 }];
          });
          setIsCartOpen(true);
        };

        const updateQuantity = (id, delta) => {
          setCart(prev => prev.map(i => {
            if (i.id === id) {
              return { ...i, quantity: Math.max(0, i.quantity + delta) };
            }
            return i;
          }).filter(i => i.quantity > 0));
        };

        const cartTotal = cart.reduce((sum, item) => {
            const price = parseFloat(item.price.replace(/,/g, ''));
            return sum + (price * item.quantity);
        }, 0);

        const scrollToTop = () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleReservation = async (e) => {
            e.preventDefault();
            setIsSubmitting(true);
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            try {
              await Backend.createReservation(data);
              setIsModalOpen(false);
              e.target.reset();
              showToast('Reservation confirmed! We look forward to welcoming you.', 'success');
            } catch (err) {
              showToast('Could not connect to server. Please make sure the backend is running.', 'error');
            } finally {
              setIsSubmitting(false);
            }
        };

        const handleInlineReservation = async (e) => {
            e.preventDefault();
            setIsInlineSubmitting(true);
            const formData = new FormData(e.target);

          } catch (err) {
            showToast('Failed to load data: ' + err.message, 'error');
          } finally {
            setAdminLoading(false);
          }
        };

        const openAdmin = () => {
          setIsAdminOpen(true);
          loadAdminData();
        };

        const handleBookingStatus = async (id, status) => {
          try {
            const updated = await Backend.updateReservationStatus(id, status, authToken);
            setAdminBookings(prev => prev.map(b => b._id === id ? { ...b, status: updated.status } : b));
            showToast(`Booking ${status}`, 'success');
          } catch (err) {
            showToast('Failed to update: ' + err.message, 'error');
          }
        };

        const handleOrderStatus = async (id, status) => {
          try {
            const updated = await Backend.updateOrderStatus(id, status, authToken);
            setAdminOrders(prev => prev.map(o => o._id === id ? { ...o, status: updated.status } : o));
            showToast(`Order marked as ${status}`, 'success');
          } catch (err) {
            showToast('Failed to update: ' + err.message, 'error');
          }
        };

        return (
          <div className="min-h-screen flex flex-col">
            {/* Navbar — always dark navy like Kivu Noir */}
            <nav className="fixed w-full z-50" style={{backgroundColor:'#1c2236'}}>

                <div className="flex items-center justify-between h-16">

                                        { id: 'cash', label: 'Cash', icon: '💵' },
                                        { id: 'card', label: 'Card', icon: '💳' },
                                        { id: 'momo', label: 'MoMo', icon: '📱' },
                                      ].map(pm => (
                                        <button
                                          key={pm.id}
                                          onClick={() => setPaymentMethod(pm.id)}
                                          className={`py-2 px-1 text-xs font-bold uppercase tracking-wider border transition-all flex flex-col items-center gap-1 ${paymentMethod === pm.id ? 'border-gold-500 bg-gold-500/10 text-gold-500' : 'border-gray-700 text-gray-500 hover:border-gray-500'}`}
                                        >
                                          <span className="text-base">{pm.icon}</span>
                                          {pm.label}
                                        </button>
                                      ))}
                                    </div>
                                    {paymentMethod === 'card' && (
                                      <div className="mb-4">
                                        <div id="stripe-card-element" className="p-3 border border-gray-700 bg-dark-900 rounded-sm min-h-[42px]"></div>
                                        {stripeError && <p className="text-red-400 text-xs mt-1">{stripeError}</p>}
                                        <p className="text-gray-600 text-xs mt-1">Test card: 4242 4242 4242 4242 · Any future date · Any CVC</p>
                                      </div>
                                    )}
                                    {paymentMethod === 'momo' && (
                                      <input
                                        type="tel"
                                        placeholder="MoMo phone (+250...)"
                                        value={momoPhone}
                                        onChange={e => setMomoPhone(e.target.value)}
                                        className="w-full mb-4 bg-transparent text-white px-3 py-2 border border-gray-700 focus:border-gold-500 focus:outline-none text-sm placeholder-gray-600"
                                      />
                                    )}
                                    <button
                                        onClick={handleCheckout}
                                        disabled={isSubmitting}
                                        className="w-full py-4 bg-gold-500 text-dark-900 font-bold uppercase tracking-widest hover:bg-white transition-all duration-300 shadow-lg disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center gap-2"
                                    >
                                        {isSubmitting ? <><Loader2 className="animate-spin" size={20} /> Processing...</> : `Pay with ${paymentMethod === 'cash' ? 'Cash' : paymentMethod === 'card' ? 'Card' : 'MoMo'}`}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )}
            {/* ── Login / Register Modal ─────────────────────── */}
            {isAuthOpen && (
              <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setIsAuthOpen(false)}></div>
                <div className="relative bg-dark-800 p-8 rounded-sm shadow-2xl border border-gold-500/20 w-full max-w-md animate-slide-up">
                  <button onClick={() => setIsAuthOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gold-500 transition-colors"><X size={22} /></button>
                  <div className="text-center mb-6">
                    <div className="w-12 h-12 rounded-full bg-gold-500/10 border border-gold-500/30 flex items-center justify-center mx-auto mb-4">
                      <User className="text-gold-500" size={22} />
                    </div>
                    <h2 className="text-2xl font-serif text-white">
                      {authTab === 'login' ? 'Welcome Back' : 'Create Account'}
                    </h2>
                  </div>

                  {/* Tabs */}
                  <div className="flex mb-6 border border-gray-700 rounded-sm overflow-hidden">
                    {['login', 'register'].map(tab => (
                      <button key={tab} onClick={() => setAuthTab(tab)}
                        className={`flex-1 py-2 text-xs font-bold uppercase tracking-widest transition-all ${authTab === tab ? 'bg-gold-500 text-dark-900' : 'text-gray-400 hover:text-white'}`}>
                        {tab === 'login' ? 'Sign In' : 'Sign Up'}
                      </button>
                    ))}
                  </div>

                  <form onSubmit={handleAuthSubmit} className="space-y-4">
                    {authTab === 'register' && (
                      <input name="name" type="text" placeholder="Full Name" required
                        className="w-full bg-dark-900 text-white px-4 py-3 border border-gray-700 focus:border-gold-500 focus:outline-none placeholder-gray-600 text-sm" />
                    )}
                    <input name="email" type="email" placeholder="Email Address" required
                      className="w-full bg-dark-900 text-white px-4 py-3 border border-gray-700 focus:border-gold-500 focus:outline-none placeholder-gray-600 text-sm" />
                    <input name="password" type="password" placeholder="Password" required
                      className="w-full bg-dark-900 text-white px-4 py-3 border border-gray-700 focus:border-gold-500 focus:outline-none placeholder-gray-600 text-sm" />
                    {authTab === 'register' && (
                      <input name="phone" type="tel" placeholder="Phone Number (optional)"
                        className="w-full bg-dark-900 text-white px-4 py-3 border border-gray-700 focus:border-gold-500 focus:outline-none placeholder-gray-600 text-sm" />
                    )}
                    <button type="submit" disabled={authLoading}
                      className="w-full py-3 bg-gold-500 text-dark-900 font-bold uppercase tracking-widest hover:bg-white transition-all disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center gap-2 text-sm">
                      {authLoading ? <><Loader2 className="animate-spin" size={18} /> {authTab === 'login' ? 'Signing In...' : 'Creating Account...'}</> : (authTab === 'login' ? 'Sign In' : 'Create Account')}
                    </button>
                  </form>

                  <p className="text-center text-gray-500 text-xs mt-5">
                    {authTab === 'login' ? "Don't have an account? " : "Already have an account? "}
                    <button onClick={() => setAuthTab(authTab === 'login' ? 'register' : 'login')} className="text-gold-500 hover:underline font-bold">
                      {authTab === 'login' ? 'Sign Up' : 'Sign In'}
                    </button>
                  </p>
                </div>
              </div>
            )}

            {/* ── Admin Dashboard ────────────────────────────── */}
            {isAdminOpen && authUser?.role === 'admin' && (
              <div className="fixed inset-0 z-[90] bg-dark-900/98 backdrop-blur-sm overflow-y-auto">
                <div className="max-w-6xl mx-auto p-6">
                  {/* Header */}
                  <div className="flex items-center justify-between mb-8 border-b border-gold-500/20 pb-6">
                    <div className="flex items-center gap-3">
                      <Shield className="text-gold-500" size={28} />
                      <div>
                        <h1 className="text-2xl font-serif text-white">Admin Dashboard</h1>
                        <p className="text-gray-500 text-sm">Cafe Acacia Management Panel</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <button onClick={loadAdminData} disabled={adminLoading} className="text-gray-400 hover:text-gold-500 transition-colors" title="Refresh">
                        <RefreshCw size={18} className={adminLoading ? 'animate-spin' : ''} />
                      </button>
                      <button onClick={() => setIsAdminOpen(false)} className="text-gray-400 hover:text-white transition-colors">
                        <X size={24} />
                      </button>
                    </div>
                  </div>

                  {/* Stats */}
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    {[
                      { label: 'Total Bookings', value: adminBookings.length, color: 'text-blue-400' },
                      { label: 'Pending', value: adminBookings.filter(b => b.status === 'pending').length, color: 'text-yellow-400' },
                      { label: 'Total Orders', value: adminOrders.length, color: 'text-purple-400' },
                      { label: 'Revenue', value: `$${adminOrders.reduce((s,o) => s + (o.total || 0), 0).toFixed(2)}`, color: 'text-gold-500' },
                    ].map((stat, i) => (
                      <div key={i} className="bg-dark-800 border border-white/5 p-4 rounded-sm">
                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-1">{stat.label}</p>
                        <p className={`text-2xl font-serif font-bold ${stat.color}`}>{stat.value}</p>
                      </div>
                    ))}
                  </div>

                  {/* Tabs */}
                  <div className="flex gap-2 mb-6">
                    {['bookings', 'orders'].map(tab => (
                      <button key={tab} onClick={() => setAdminTab(tab)}
                        className={`px-6 py-2 text-xs font-bold uppercase tracking-widest border transition-all ${adminTab === tab ? 'border-gold-500 bg-gold-500/10 text-gold-500' : 'border-gray-700 text-gray-400 hover:text-white'}`}>
                        {tab === 'bookings' ? `Reservations (${adminBookings.length})` : `Orders (${adminOrders.length})`}
                      </button>
                    ))}
                  </div>

                  {adminLoading ? (
                    <div className="flex justify-center py-20">
                      <Loader2 className="animate-spin text-gold-500" size={36} />
                    </div>
                  ) : adminTab === 'bookings' ? (
                    <div className="space-y-3">
                      {adminBookings.length === 0 ? (
                        <p className="text-center text-gray-500 py-16">No reservations yet.</p>
                      ) : adminBookings.map(b => (
                        <div key={b._id} className="bg-dark-800 border border-white/5 p-4 rounded-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 flex-1 text-sm">
                            <div><p className="text-gray-500 text-xs mb-0.5">Guest</p><p className="text-white font-medium">{b.name}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Date & Time</p><p className="text-white">{b.date} · {b.time}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Guests / Type</p><p className="text-white">{b.persons} · {b.bookingType}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Phone</p><p className="text-white">{b.phone}</p></div>
                          </div>
                          <div className="flex items-center gap-3">
                            <span className={`text-xs font-bold uppercase px-3 py-1 rounded-full ${
                              b.status === 'confirmed' ? 'bg-green-500/10 text-green-400 border border-green-500/20' :
                              b.status === 'cancelled' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
                              'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                            }`}>{b.status}</span>
                            {b.status === 'pending' && (
                              <>
                                <button onClick={() => handleBookingStatus(b._id, 'confirmed')} className="p-1.5 rounded-full bg-green-500/10 text-green-400 hover:bg-green-500/20 transition-colors" title="Confirm"><CheckCircle size={18} /></button>
                                <button onClick={() => handleBookingStatus(b._id, 'cancelled')} className="p-1.5 rounded-full bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors" title="Cancel"><XCircle size={18} /></button>
                              </>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {adminOrders.length === 0 ? (
                        <p className="text-center text-gray-500 py-16">No orders yet.</p>
                      ) : adminOrders.map(o => (
                        <div key={o._id} className="bg-dark-800 border border-white/5 p-4 rounded-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-3 mb-2">
                              <p className="text-white font-medium">{o.customerName}</p>
                              <span className="text-gray-500 text-xs">{o.paymentMethod?.toUpperCase()}</span>
                            </div>
                            <p className="text-gray-400 text-sm">{(o.items || []).map(i => `${i.name} x${i.quantity}`).join(' · ')}</p>
                          </div>
                          <div className="flex items-center gap-4">
                            <span className="text-gold-500 font-bold font-serif">${(o.total || 0).toFixed(2)}</span>
                            <select
                              value={o.status}
                              onChange={ev => handleOrderStatus(o._id, ev.target.value)}
                              className="bg-dark-900 text-white text-xs border border-gray-700 px-3 py-1.5 focus:border-gold-500 focus:outline-none cursor-pointer"
                            >
                              {['preparing', 'ready', 'delivered', 'cancelled'].map(s => (
                                <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                              ))}
                            </select>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Toast Notifications */}
            <div className="toast-container">
              {toasts.map(t => (
                <div key={t.id} className={`toast toast-${t.type}`}>
                  <span style={{fontSize:'18px'}}>
                    {t.type === 'success' && '✓'}
                    {t.type === 'error'   && '✗'}
                    {t.type === 'info'    && '＋'}
                  </span>
                  <span>{t.message}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
