      /* Toast Notifications */
      .toast-container {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 99999;
        display: flex;
        flex-direction: column-reverse;
        gap: 10px;
        align-items: center;
        pointer-events: none;

      .toast {
        pointer-events: all;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 22px;
        font-size: 14px;
        font-weight: 500;
        min-width: 300px;
        max-width: 500px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        animation: toastIn 0.35s cubic-bezier(0.21,1.02,0.73,1) forwards;

      .toast-success { background: #0a1f0a; border-left: 4px solid #4ade80; color: #86efac; }

      .toast-info    { background: #1a1409; border-left: 4px solid #d1a054; color: #e4c590; }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(14px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .cat-tab {
        padding: 8px 22px;

        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        border: 1px solid rgba(209,160,84,0.25);
        color: #6b7280;
        background: transparent;
        cursor: pointer;
        transition: all 0.2s;
      }
      .cat-tab:hover  { color: #d1a054; border-color: rgba(209,160,84,0.6); }
      .cat-tab.active { background: #d1a054; color: #0e1013; border-color: #d1a054; }

      /* API Status Badge */
      .api-badge {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
        padding: 3px 10px; border-radius: 20px; text-transform: uppercase;

      .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }

      .reveal-left { opacity: 0; transform: translateX(-32px); transition: opacity 0.7s ease, transform 0.7s ease; }

      /* Menu Cards */
      .menu-card {
        background: #16191d;

        border: 1px solid rgba(209,160,84,0.15);

      /* Gradient text */
      .gradient-text {
        background: linear-gradient(135deg, #e4c590 0%, #d1a054 50%, #b38236 100%);

        -webkit-text-fill-color: transparent;

      /* Section divider */
      .section-divider {
        width: 100%; height: 1px;
        background: linear-gradient(to right, transparent, rgba(209,160,84,0.4), transparent);
      }

      /* Floating label inputs */
      .input-line {
        position: relative;
      }
      .input-line::after {
        content: ''; position: absolute; bottom: 0; left: 0;
        width: 0; height: 1px; background: #d1a054;
        transition: width 0.3s ease;
      }
      .input-line:focus-within::after { width: 100%; }

      /* Shimmer button */
      .btn-gold {
        position: relative; overflow: hidden;
        background: #d1a054; color: #0e1013;
        font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
        transition: all 0.3s ease;
      }
      .btn-gold::after {
        content: ''; position: absolute;
        top: 0; left: -100%; width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        transform: skewX(-20deg);
        transition: left 0.5s ease;
      }
      .btn-gold:hover { background: #e4c590; box-shadow: 0 8px 25px rgba(209,160,84,0.35); }
      .btn-gold:hover::after { left: 150%; }

      /* Testimonial card */
      .testimonial-card {
        background: #16191d; border: 1px solid rgba(255,255,255,0.05);
        padding: 2rem; position: relative;
        transition: border-color 0.3s ease, transform 0.3s ease;

      .testimonial-card::before {

      /* Line clamp */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

        from { transform: translateX(100%); }
        to   { transform: translateX(0); }

      /* Page load fade */
      @keyframes pageFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

        async createReservation(data) {
          const res = await fetch(`${API_URL}/reservations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
          if (!res.ok) throw new Error('Failed to create reservation');
          const result = await res.json();
          return { success: true, message: "Reservation confirmed!", data: result };
        },

          const res = await fetch(`${API_URL}/orders`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

        const [isCartOpen, setIsCartOpen] = React.useState(false);
        const [isSubmitting, setIsSubmitting] = React.useState(false);
        const [isInlineSubmitting, setIsInlineSubmitting] = React.useState(false);
        const [toasts, setToasts] = React.useState([]);
        const [activeCategory, setActiveCategory] = React.useState('all');
        const [apiStatus, setApiStatus] = React.useState('checking');
        const [paymentMethod, setPaymentMethod] = React.useState('cash');
        const [momoPhone, setMomoPhone] = React.useState('');
        const [stripeError, setStripeError] = React.useState('');
        const stripeCardMounted = React.useRef(false);

        // Auth state
        const [authToken, setAuthToken] = React.useState(() => localStorage.getItem('cafe_token'));
        const [authUser, setAuthUser] = React.useState(() => {
          try { return JSON.parse(localStorage.getItem('cafe_user')); } catch { return null; }
        });
        const [isAuthOpen, setIsAuthOpen] = React.useState(false);
        const [authTab, setAuthTab] = React.useState('login'); // 'login' | 'register'
        const [authLoading, setAuthLoading] = React.useState(false);

        // Admin state
        const [isAdminOpen, setIsAdminOpen] = React.useState(false);
        const [adminTab, setAdminTab] = React.useState('bookings'); // 'bookings' | 'orders'
        const [adminBookings, setAdminBookings] = React.useState([]);
        const [adminOrders, setAdminOrders] = React.useState([]);
        const [adminLoading, setAdminLoading] = React.useState(false);

        const showToast = (message, type = 'success') => {
          const id = Date.now();
          setToasts(prev => [...prev, { id, message, type }]);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4500);
        };

        // Check backend connection on load
        React.useEffect(() => {
          fetch(`${API_URL}/health`)
            .then(r => r.ok ? setApiStatus('online') : setApiStatus('offline'))
            .catch(() => setApiStatus('offline'));
        }, []);

        // Mount Stripe card element when card payment is selected
        React.useEffect(() => {
          if (paymentMethod === 'card' && isCartOpen) {
            setTimeout(() => {
              const el = document.getElementById('stripe-card-element');
              if (el && !stripeCardMounted.current) {
                const stripe = getStripe();
                if (!stripe) return;
                const elements = stripe.elements();
                _cardElement = elements.create('card', {
                  style: {
                    base: { color: '#fff', fontSize: '14px', fontFamily: 'inherit', '::placeholder': { color: '#6b7280' } },
                    invalid: { color: '#ef4444' },
                  },
                });
                _cardElement.mount('#stripe-card-element');
                _cardElement.on('change', e => setStripeError(e.error ? e.error.message : ''));
                stripeCardMounted.current = true;
              }
            }, 150);
          } else {
            if (_cardElement && stripeCardMounted.current) {
              _cardElement.unmount();
              _cardElement = null;
              stripeCardMounted.current = false;
              setStripeError('');
            }
          }
        }, [paymentMethod, isCartOpen]);

        // Scroll reveal
        React.useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
            { threshold: 0.12 }
          );
          document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach(el => observer.observe(el));
          return () => observer.disconnect();
        }, [activeCategory]);

        React.useEffect(() => {
          const handleScroll = () => {
            setScrolled(window.scrollY > 50);
            setShowBackToTop(window.scrollY > 300);
          };

          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        React.useEffect(() => {
          const timer = setInterval(() => {
            setCurrentSlide((prev) => (prev + 1) % HERO_SLIDES.length);
          }, 5000);
          return () => clearInterval(timer);
        }, []);

        const addToCart = (item) => {
          setCart(prev => {
            const existing = prev.find(i => i.id === item.id);
            if (existing) {
              return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
            }
            return [...prev, { ...item, quantity: 1 }];
          });
          setIsCartOpen(true);
        };

        const updateQuantity = (id, delta) => {
          setCart(prev => prev.map(i => {
            if (i.id === id) {
              return { ...i, quantity: Math.max(0, i.quantity + delta) };
            }
            return i;
          }).filter(i => i.quantity > 0));
        };

        const cartTotal = cart.reduce((sum, item) => {
            const price = parseFloat(item.price.replace('$', ''));
            return sum + (price * item.quantity);
        }, 0);

        const scrollToTop = () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleReservation = async (e) => {
            e.preventDefault();
            setIsSubmitting(true);
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            try {
              await Backend.createReservation(data);
              setIsModalOpen(false);
              e.target.reset();
              showToast('Reservation confirmed! We look forward to welcoming you.', 'success');
            } catch (err) {
              showToast('Could not connect to server. Please make sure the backend is running.', 'error');
            } finally {
              setIsSubmitting(false);
            }
        };

        const handleInlineReservation = async (e) => {
            e.preventDefault();
            setIsInlineSubmitting(true);
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            try {
              await Backend.createReservation(data);
              e.target.reset();
              showToast('Reservation confirmed! We look forward to welcoming you.', 'success');
            } catch (err) {
              showToast('Could not connect to server. Please make sure the backend is running.', 'error');
            } finally {
              setIsInlineSubmitting(false);
            }
        };

        const handleCheckout = async () => {
            setIsSubmitting(true);
            try {
              if (paymentMethod === 'card') {
                // Stripe card payment
                const res = await fetch(`${API_URL}/payment/create-intent`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ amount: Math.round(cartTotal * 100), currency: 'usd' }),
                });
                const intentData = await res.json();
                if (!intentData.clientSecret) throw new Error('Payment setup failed');

                const stripe = getStripe();
                const { error, paymentIntent } = await stripe.confirmCardPayment(intentData.clientSecret, {
                  payment_method: { card: _cardElement },
                });
                if (error) { showToast(error.message, 'error'); setIsSubmitting(false); return; }

                await Backend.placeOrder({
                  items: cart, total: cartTotal,
                  customerName: authUser?.name || 'Guest',
                  customerEmail: authUser?.email,
                  paymentMethod: 'card',
                  paymentStatus: 'paid',
                  paymentId: paymentIntent.id,
                });
              } else {
                await Backend.placeOrder({
                  items: cart, total: cartTotal,
                  customerName: authUser?.name || 'Guest',
                  customerEmail: authUser?.email,
                  paymentMethod,
                });
              }
              setCart([]);
              setIsCartOpen(false);
              setPaymentMethod('cash');
              showToast('Order placed! Our kitchen is preparing your meal.', 'success');
            } catch (err) {
              showToast(err.message || 'Could not place order. Please try again.', 'error');
            } finally {
              setIsSubmitting(false);
            }
        };

        const handleAuthSubmit = async (e) => {
          e.preventDefault();
          setAuthLoading(true);
          const fd = new FormData(e.target);
          try {
            let result;
            if (authTab === 'login') {
              result = await Backend.login(fd.get('email'), fd.get('password'));
            } else {
              result = await Backend.register(fd.get('name'), fd.get('email'), fd.get('password'), fd.get('phone'));
            }
            const { token, data } = result;
            localStorage.setItem('cafe_token', token);
            localStorage.setItem('cafe_user', JSON.stringify(data));
            setAuthToken(token);
            setAuthUser(data);
            setIsAuthOpen(false);
            showToast(`Welcome, ${data.name}!`, 'success');
          } catch (err) {
            showToast(err.message || 'Authentication failed', 'error');
          } finally {
            setAuthLoading(false);
          }
        };

        const handleLogout = () => {
          localStorage.removeItem('cafe_token');
          localStorage.removeItem('cafe_user');
          setAuthToken(null);
          setAuthUser(null);
          setIsAdminOpen(false);
          showToast('Logged out successfully', 'info');
        };

        const loadAdminData = async () => {
          setAdminLoading(true);
          try {
            const [bookings, orders] = await Promise.all([
              Backend.getReservations(authToken),
              Backend.getOrders(authToken),
            ]);
            setAdminBookings(bookings || []);
            setAdminOrders(orders || []);
          } catch (err) {
            showToast('Failed to load data: ' + err.message, 'error');
          } finally {
            setAdminLoading(false);
          }
        };

        const openAdmin = () => {
          setIsAdminOpen(true);
          loadAdminData();
        };

        const handleBookingStatus = async (id, status) => {
          try {
            const updated = await Backend.updateReservationStatus(id, status, authToken);
            setAdminBookings(prev => prev.map(b => b._id === id ? { ...b, status: updated.status } : b));
            showToast(`Booking ${status}`, 'success');
          } catch (err) {
            showToast('Failed to update: ' + err.message, 'error');
          }
        };

        const handleOrderStatus = async (id, status) => {
          try {
            const updated = await Backend.updateOrderStatus(id, status, authToken);
            setAdminOrders(prev => prev.map(o => o._id === id ? { ...o, status: updated.status } : o));
            showToast(`Order marked as ${status}`, 'success');
          } catch (err) {
            showToast('Failed to update: ' + err.message, 'error');
          }
        };

        return (
          <div className="min-h-screen flex flex-col">
            {/* Navbar */}
            <nav className={`fixed w-full z-50 transition-all duration-300 ${
              scrolled ? 'bg-dark-900/95 backdrop-blur-md border-b border-white/10 py-0 shadow-lg' : 'bg-transparent py-4'
            }`}>
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-center justify-between h-20">
                  <div className="flex-shrink-0">
                    <span className="font-serif text-2xl text-gold-500 font-bold tracking-wider">CAFE ACACIA</span>
                  </div>
                  
                  {/* Desktop Menu */}
                  <div className="hidden md:block">
                    <div className="ml-10 flex items-baseline space-x-8">
                      {NAV_LINKS.map((item) => (
                        <a key={item.name} href={item.href} className="text-gray-300 hover:text-gold-500 transition-colors px-3 py-2 rounded-md text-sm font-medium uppercase tracking-widest">
                          {item.name}
                        </a>
                      ))}
                    </div>
                  </div>

                  {/* API Status + Auth + Admin */}
                  <div className="hidden md:flex items-center gap-3">
                    <span className={`api-badge ${apiStatus === 'online' ? 'api-online' : 'api-offline'}`}>
                      <span className={`api-dot ${apiStatus === 'online' ? 'api-dot-online' : 'api-dot-offline'}`}></span>
                      {apiStatus === 'online' ? 'Server Online' : apiStatus === 'offline' ? 'Server Offline' : 'Connecting...'}
                    </span>
                    {authUser ? (
                      <>
                        {authUser.role === 'admin' && (
                          <button onClick={openAdmin} className="flex items-center gap-1.5 text-xs font-bold uppercase tracking-widest text-gold-500 border border-gold-500/40 px-3 py-1.5 hover:bg-gold-500 hover:text-dark-900 transition-all">
                            <LayoutDashboard size={14} /> Admin
                          </button>
                        )}
                        <span className="text-gray-400 text-xs">{authUser.name}</span>
                        <button onClick={handleLogout} className="text-gray-500 hover:text-red-400 transition-colors" title="Logout">
                          <LogOut size={16} />
                        </button>
                      </>
                    ) : (
                      <button onClick={() => { setAuthTab('login'); setIsAuthOpen(true); }} className="flex items-center gap-1.5 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-gold-500 transition-colors">
                        <LogIn size={14} /> Login
                      </button>
                    )}
                  </div>

                  {/* Cart Button */}
                  <button onClick={() => setIsCartOpen(true)} className="relative text-gray-300 hover:text-gold-500 transition-colors p-2 mr-2 md:mr-0">
                    <ShoppingBag size={24} />
                    {cart.length > 0 && (
                      <span className="absolute -top-1 -right-1 bg-gold-500 text-dark-900 text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">
                        {cart.reduce((acc, item) => acc + item.quantity, 0)}
                      </span>
                    )}
                  </button>

                  {/* Mobile Menu Button */}
                  <div className="md:hidden">
                    <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-gray-300 hover:text-gold-500 transition-colors p-2 relative z-50">
                      {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                    </button>
                  </div>
                </div>
              </div>

              {/* Mobile Menu Overlay */}
              <div className={`fixed inset-0 bg-dark-900/95 backdrop-blur-xl z-40 transition-transform duration-300 md:hidden flex flex-col items-center justify-center gap-8 ${isMobileMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                {NAV_LINKS.map((item) => (
                  <a 
                    key={item.name} 
                    href={item.href} 
                    onClick={() => setIsMobileMenuOpen(false)}
                    className="text-2xl font-serif text-white hover:text-gold-500 transition-colors"
                  >
                    {item.name}
                  </a>
                ))}
                <button 
                    onClick={() => { setIsMobileMenuOpen(false); setIsModalOpen(true); }}
                    className="mt-4 border border-gold-500 text-gold-500 px-8 py-3 uppercase tracking-widest font-bold hover:bg-gold-500 hover:text-dark-900 transition-colors"
                  >
                    Book a Table
                  </button>
              </div>
            </nav>

            {/* Hero Section */}
            <section id="home" className="relative h-screen flex items-center justify-center bg-dark-900 overflow-hidden">
              {HERO_SLIDES.map((slide, index) => (
                <div 
                  key={index}
                  className={`absolute inset-0 bg-cover bg-center transition-opacity duration-1000 ${index === currentSlide ? 'opacity-40' : 'opacity-0'}`}
                  style={{ backgroundImage: `url('${slide}')` }}
                ></div>
              ))}
              <div className="absolute inset-0 bg-gradient-to-t from-dark-900 via-dark-900/50 to-transparent"></div>
              
              <div className="relative z-10 text-center px-4 max-w-4xl mx-auto animate-fade-in">
                <div className="separator mb-6">
                  <span className="separator-icon"></span>
                  <span className="text-gold-500 uppercase tracking-[0.2em] text-sm">The Art of Dining</span>
                  <span className="separator-icon"></span>
                </div>
                <h1 className="font-serif text-5xl md:text-7xl lg:text-8xl text-white mb-8 leading-tight">
                  The Pure Taste of <br/>
                  <span className="text-gold-500">Acacia</span>
                </h1>
                <p className="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 font-light leading-relaxed">
                  Experience a culinary journey where tradition meets innovation. 
                  Every dish tells a story of flavor, passion, and excellence.
                </p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                  <a href="#menu" className="btn-gold px-8 py-4 inline-block text-sm tracking-widest">
                    View Menu
                  </a>
                  <button
                    onClick={() => setIsModalOpen(true)}
                    className="border border-gold-500 text-gold-500 px-8 py-4 uppercase tracking-widest font-bold text-sm hover:bg-gold-500 hover:text-dark-900 transition-all duration-300 hover:shadow-[0_8px_25px_rgba(209,160,84,0.3)]"
                  >
                    Book a Table
                  </button>
                </div>
              </div>
            </section>

            {/* Features */}
            <section className="py-20 bg-dark-800 relative">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {[
                    { icon: Clock, title: "Opening Hours", text: "Mon-Sun: 09:00 AM - 10:00 PM" },
                    { icon: MapPin, title: "Location", text: "Kisiment Kg 201 Rukiri 2, Kigali" },
                    { icon: Phone, title: "Reservations", text: "+250 787 217 72" }
                  ].map((feature, idx) => (
                    <div key={idx} className={`reveal bg-dark-700 p-8 text-center border border-white/5 hover:border-gold-500/30 transition-all duration-300 group`} style={{transitionDelay:`${idx*0.12}s`}}>
                      <div className="w-16 h-16 rounded-full bg-gold-500/10 border border-gold-500/20 flex items-center justify-center mx-auto mb-6 group-hover:bg-gold-500/20 transition-colors">
                        <feature.icon className="w-7 h-7 text-gold-500 group-hover:scale-110 transition-transform duration-300" />
                      </div>
                      <h3 className="font-serif text-xl text-white mb-3">{feature.title}</h3>
                      <p className="text-gray-400 text-sm font-sans">{feature.text}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Stats */}
            <section className="py-16 bg-dark-900">
              <div className="section-divider mb-16"></div>
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { number: '12+', label: 'Years of Excellence' },
                    { number: '50+', label: 'Signature Dishes' },
                    { number: '10K+', label: 'Happy Guests' },
                    { number: '8', label: 'Award Winning Chef' },
                  ].map((stat, i) => (
                    <div key={i} className="stat-card reveal" style={{transitionDelay:`${i*0.1}s`}}>
                      <p className="gradient-text font-serif text-4xl md:text-5xl font-bold mb-2">{stat.number}</p>
                      <p className="text-gray-500 text-xs uppercase tracking-widest">{stat.label}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div className="section-divider mt-16"></div>
            </section>

            {/* Menu Section */}
            <section id="menu" className="py-24 bg-dark-900">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="text-center mb-12 reveal">
                  <span className="text-gold-500 font-serif italic text-xl">Discover</span>
                  <h2 className="text-4xl md:text-5xl font-serif text-white mt-2 mb-4">Our Menu</h2>
                  <div className="w-24 h-1 bg-gold-500 mx-auto mb-10"></div>

                  {/* Category Filter Tabs */}
                  <div className="flex flex-wrap justify-center gap-2">
                    {['all', 'breakfast', 'lunch', 'dinner', 'drinks'].map(cat => (
                      <button
                        key={cat}
                        onClick={() => setActiveCategory(cat)}
                        className={`cat-tab ${activeCategory === cat ? 'active' : ''}`}
                      >
                        {cat === 'all' ? 'All Items' : cat}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                  {MENU_ITEMS.filter(item => activeCategory === 'all' || item.category === activeCategory).map((item, idx) => (
                    <div key={item.id} className="menu-card reveal" style={{transitionDelay:`${(idx % 4) * 0.08}s`}}>
                      <div className="relative overflow-hidden" style={{height:'200px'}}>
                        <img src={item.image} alt={item.name} className="menu-card-img" style={{width:'100%',height:'100%',objectFit:'cover'}} />
                        <div className="menu-card-overlay">
                          <button
                            onClick={() => { addToCart(item); showToast(`${item.name} added to your order`, 'info'); }}
                            className="w-full py-2.5 btn-gold text-xs tracking-widest flex items-center justify-center gap-2"
                          >
                            <Plus size={14} /> Add to Order
                          </button>
                        </div>
                        <span className="menu-card-badge">{item.category}</span>
                      </div>
                      <div className="p-4">
                        <div className="flex justify-between items-start mb-2">
                          <h3 className="font-serif text-white text-base leading-tight flex-1 pr-2 group-hover:text-gold-500 transition-colors">{item.name}</h3>
                          <span className="text-gold-500 font-bold text-base shrink-0">{item.price}</span>
                        </div>
                        <p className="text-gray-500 text-xs leading-relaxed mb-4 line-clamp-2">{item.description}</p>
                        <button
                          onClick={() => { addToCart(item); showToast(`${item.name} added to your order`, 'info'); }}
                          className="w-full py-2 btn-gold text-[10px] tracking-widest flex items-center justify-center gap-1.5"
                        >
                          <Plus size={12} /> Add to Order
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                {MENU_ITEMS.filter(item => activeCategory === 'all' || item.category === activeCategory).length === 0 && (
                  <p className="text-center text-gray-500 py-16">No items in this category.</p>
                )}
              </div>
            </section>

            {/* About Us Section */}
            <section id="about" className="py-24 bg-dark-900 relative overflow-hidden">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                <div className="flex flex-col lg:flex-row items-center gap-16">
                  <div className="lg:w-1/2 reveal-left">
                    <div className="relative">
                      <div className="absolute -top-4 -left-4 w-24 h-24 border-t-2 border-l-2 border-gold-500/50"></div>
                      <img src="https://images.unsplash.com/photo-1577219491135-ce391730fb2c?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Chef" className="w-full h-auto rounded-sm shadow-2xl relative z-10 grayscale hover:grayscale-0 transition-all duration-700" />
                      <div className="absolute -bottom-4 -right-4 w-24 h-24 border-b-2 border-r-2 border-gold-500/50"></div>
                    </div>
                  </div>
                  <div className="lg:w-1/2 text-center lg:text-left reveal-right">
                    <span className="text-gold-500 font-serif italic text-xl">Our Story</span>
                    <h2 className="text-4xl md:text-5xl font-serif text-white mt-2 mb-6">The Chef's Kitchen</h2>
                    <p className="text-gray-400 mb-8 leading-relaxed text-lg">
                      At Cafe Acacia, we believe that food is more than just sustenance—it is a language of love, heritage, and creativity. Our journey began with a simple passion for authentic flavors and has grown into a culinary destination.
                    </p>
                    <blockquote className="relative border-l-4 border-gold-500 pl-6 italic text-gray-300 text-xl mb-8">
                      "Cooking is an art, but all art requires knowing something about the techniques and materials. We strive to bring the soul of the ingredients to your plate."
                    </blockquote>
                    <div className="flex items-center justify-center lg:justify-start gap-4">
                       <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Head Chef" className="w-12 h-12 rounded-full border border-gold-500" />
                       <div>
                         <p className="text-white font-serif text-lg">Antoine R.</p>
                         <p className="text-gold-500 text-xs uppercase tracking-widest">Head Chef</p>
                       </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* Testimonials */}
            <section className="py-24 bg-dark-800">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="text-center mb-14 reveal">
                  <span className="text-gold-500 font-serif italic text-xl">Kind Words</span>
                  <h2 className="text-4xl md:text-5xl font-serif text-white mt-2 mb-4">Guest Reviews</h2>
                  <div className="w-24 h-1 bg-gold-500 mx-auto"></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {[

                        <RefreshCw size={18} className={adminLoading ? 'animate-spin' : ''} />
                      </button>
                      <button onClick={() => setIsAdminOpen(false)} className="text-gray-400 hover:text-white transition-colors">
                        <X size={24} />
                      </button>
                    </div>
                  </div>

                  {/* Stats */}
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    {[
                      { label: 'Total Bookings', value: adminBookings.length, color: 'text-blue-400' },
                      { label: 'Pending', value: adminBookings.filter(b => b.status === 'pending').length, color: 'text-yellow-400' },
                      { label: 'Total Orders', value: adminOrders.length, color: 'text-purple-400' },
                      { label: 'Revenue', value: `$${adminOrders.reduce((s,o) => s + (o.total || 0), 0).toFixed(2)}`, color: 'text-gold-500' },
                    ].map((stat, i) => (
                      <div key={i} className="bg-dark-800 border border-white/5 p-4 rounded-sm">
                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-1">{stat.label}</p>
                        <p className={`text-2xl font-serif font-bold ${stat.color}`}>{stat.value}</p>
                      </div>
                    ))}
                  </div>

                  {/* Tabs */}
                  <div className="flex gap-2 mb-6">
                    {['bookings', 'orders'].map(tab => (
                      <button key={tab} onClick={() => setAdminTab(tab)}
                        className={`px-6 py-2 text-xs font-bold uppercase tracking-widest border transition-all ${adminTab === tab ? 'border-gold-500 bg-gold-500/10 text-gold-500' : 'border-gray-700 text-gray-400 hover:text-white'}`}>
                        {tab === 'bookings' ? `Reservations (${adminBookings.length})` : `Orders (${adminOrders.length})`}
                      </button>
                    ))}
                  </div>

                  {adminLoading ? (
                    <div className="flex justify-center py-20">
                      <Loader2 className="animate-spin text-gold-500" size={36} />
                    </div>
                  ) : adminTab === 'bookings' ? (
                    <div className="space-y-3">
                      {adminBookings.length === 0 ? (
                        <p className="text-center text-gray-500 py-16">No reservations yet.</p>
                      ) : adminBookings.map(b => (
                        <div key={b._id} className="bg-dark-800 border border-white/5 p-4 rounded-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 flex-1 text-sm">
                            <div><p className="text-gray-500 text-xs mb-0.5">Guest</p><p className="text-white font-medium">{b.name}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Date & Time</p><p className="text-white">{b.date} · {b.time}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Guests / Type</p><p className="text-white">{b.persons} · {b.bookingType}</p></div>
                            <div><p className="text-gray-500 text-xs mb-0.5">Phone</p><p className="text-white">{b.phone}</p></div>
                          </div>
                          <div className="flex items-center gap-3">
                            <span className={`text-xs font-bold uppercase px-3 py-1 rounded-full ${
                              b.status === 'confirmed' ? 'bg-green-500/10 text-green-400 border border-green-500/20' :
                              b.status === 'cancelled' ? 'bg-red-500/10 text-red-400 border border-red-500/20' :
                              'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'
                            }`}>{b.status}</span>
                            {b.status === 'pending' && (
                              <>
                                <button onClick={() => handleBookingStatus(b._id, 'confirmed')} className="p-1.5 rounded-full bg-green-500/10 text-green-400 hover:bg-green-500/20 transition-colors" title="Confirm"><CheckCircle size={18} /></button>
                                <button onClick={() => handleBookingStatus(b._id, 'cancelled')} className="p-1.5 rounded-full bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors" title="Cancel"><XCircle size={18} /></button>
                              </>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {adminOrders.length === 0 ? (
                        <p className="text-center text-gray-500 py-16">No orders yet.</p>
                      ) : adminOrders.map(o => (
                        <div key={o._id} className="bg-dark-800 border border-white/5 p-4 rounded-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-3 mb-2">
                              <p className="text-white font-medium">{o.customerName}</p>
                              <span className="text-gray-500 text-xs">{o.paymentMethod?.toUpperCase()}</span>
                            </div>
                            <p className="text-gray-400 text-sm">{(o.items || []).map(i => `${i.name} x${i.quantity}`).join(' · ')}</p>
                          </div>
                          <div className="flex items-center gap-4">
                            <span className="text-gold-500 font-bold font-serif">${(o.total || 0).toFixed(2)}</span>
                            <select
                              value={o.status}
                              onChange={ev => handleOrderStatus(o._id, ev.target.value)}
                              className="bg-dark-900 text-white text-xs border border-gray-700 px-3 py-1.5 focus:border-gold-500 focus:outline-none cursor-pointer"
                            >
                              {['preparing', 'ready', 'delivered', 'cancelled'].map(s => (
                                <option key={s} value={s}>{s.charAt(0).toUpperCase() + s.slice(1)}</option>
                              ))}
                            </select>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Toast Notifications */}
            <div className="toast-container">
              {toasts.map(t => (
                <div key={t.id} className={`toast toast-${t.type}`}>
                  <span style={{fontSize:'18px'}}>
                    {t.type === 'success' && '✓'}
                    {t.type === 'error'   && '✗'}
                    {t.type === 'info'    && '＋'}
                  </span>
                  <span>{t.message}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
